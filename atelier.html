<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#A67C00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sarkin Wanka">
    <link rel="apple-touch-icon" href="assets/img/logo.png">
    <link rel="icon" type="image/png" href="assets/img/logo.png">
    <link rel="manifest" href="manifest.json">
    <title>SARKIN WANKA NIGER — Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.v2.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body class="light-theme">
<div class="app-container">
    <!-- SIDEBAR DESKTOP -->
    <nav class="sidebar glass-panel">
        <div class="sidebar-header" style="justify-content:center;padding:16px 0 0;">
            <div class="logo" style="flex-direction:column;gap:8px;margin-bottom:2rem;">
                <img src="assets/img/logo.png" alt="SARKIN WANKA NIGER" style="width:100px;height:100px;border-radius:50%;object-fit:cover;box-shadow:0 4px 16px rgba(166,124,0,0.4),0 0 0 3px #A67C00;"><div style="font-size:0.65rem;color:var(--primary-color);font-weight:700;margin-top:2px;letter-spacing:1px;opacity:0.8;">v2.5 PREMIUM</div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-calendar-day"></i> Agenda</a></li>
            <li class="active"><a href="atelier.html"><i class="fa-solid fa-tape"></i> Atelier</a></li>
            <li><a href="boutique.html" style="display:flex;justify-content:space-between;align-items:center;"><span><i class="fa-solid fa-store"></i> Boutique</span><span class="boutique-badge badge badge-success" style="display:none;font-size:0.7rem;padding:2px 6px;">0</span></a></li>
            <li><a href="bibliotheque.html"><i class="fa-solid fa-book-open"></i> Bibliothèque</a></li>
        </ul>
        <div class="sidebar-footer">
            <button id="theme-toggle" class="btn-icon"><i class="fa-solid fa-moon"></i></button>
            <a href="parametre.html" class="btn-icon" title="Paramètres" style="text-decoration:none;"><i class="fa-solid fa-gear"></i></a>
        </div>
    </nav>

    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav">
        <ul>
            <li><a href="index.html"><i class="fa-solid fa-calendar-day"></i><span>Agenda</span></a></li>
            <li class="active"><a href="atelier.html"><i class="fa-solid fa-tape"></i><span>Atelier</span></a></li>
            <li class="new-btn"><a href="#" onclick="openNewTaskModal();return false;" style="color:var(--primary-color);"><i class="fa-solid fa-plus-circle" style="font-size:1.5rem;"></i><span>Ajouter</span></a></li>
            <li style="position:relative;"><a href="boutique.html"><i class="fa-solid fa-store"></i><span>Boutique</span><span class="boutique-badge badge badge-success" style="display:none;position:absolute;top:5px;right:15%;font-size:0.6rem;padding:2px 5px;min-width:16px;border:2px solid var(--surface-color);">0</span></a></li>
            <li><a href="parametre.html"><i class="fa-solid fa-gear"></i><span>Réglages</span></a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-header">
            <div>
                <h1>Atelier - En Confection</h1>
                <p class="subtitle" id="current-date">Aujourd'hui</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openNewTaskModal()">
                    <i class="fa-solid fa-plus"></i> Nouvelle Commande
                </button>
            </div>
        </header>

        <section class="agenda-section">
            <div class="agenda-header">
                <h2>Pièces en cours de confection</h2>
            </div>
            <div class="atelier-grid" id="atelier-list">
                <div class="loading-state"><i class="fa-solid fa-spinner fa-spin"></i> Chargement…</div>
            </div>
        </section>
    </main>
</div>

<!-- Modal nouvelle commande -->
<div id="task-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeNewTaskModal()">&times;</span>
        <h2><i class="fa-solid fa-plus" style="color:var(--primary-color);font-size:1.1rem;"></i> Nouvelle Commande</h2>
        <form id="new-task-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom du Client</label>
                    <input type="text" id="client-name" required placeholder="Ex : Aïcha Moussa">
                </div>
                <div class="form-group">
                    <label>N° WhatsApp</label>
                    <input type="tel" id="client-phone" placeholder="Ex : +22792622764">
                </div>
            </div>
            <div class="form-group">
                <label>Type de vêtement</label>
                <input type="text" id="cloth-type" required placeholder="Ex : Robe de soirée">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Prix (FCFA)</label>
                    <input type="number" id="task-price" placeholder="Ex : 15000" inputmode="numeric">
                </div>
                <div class="form-group">
                    <label>Date de livraison</label>
                    <input type="date" id="due-date" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Étape initiale</label>
                    <select id="initial-step">
                        <option value="agenda">Agenda (Prise de mesure)</option>
                        <option value="atelier" selected>Atelier (En confection)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Attribuer au tailleur</label>
                    <select id="task-assignee">
                        <option value="">— Atelier Général —</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Photo du Tissu / Modèle <span style="font-weight:400;text-transform:none;">(Optionnel)</span></label>
                <div class="file-upload-wrapper">
                    <input type="file" id="cloth-photo" accept="image/*" capture="environment" class="file-input">
                    <div class="file-upload-box" id="file-upload-box">
                        <i class="fa-solid fa-camera"></i>
                        <span>Prendre une photo ou importer</span>
                    </div>
                    <img id="photo-preview" class="photo-preview" style="display:none;" alt="Aperçu">
                </div>
            </div>
            <div class="form-group">
                <label>Notes &amp; Mesures</label>
                <textarea id="task-notes" rows="3" placeholder="Ex : Tour de taille 75cm, longueur 120cm…"></textarea>
            </div>
            
            <div class="form-actions" style="justify-content: space-between !important; display: flex !important;">
                <button type="button" id="btn-delete-in-modal" class="btn btn-secondary" style="color:var(--danger-color); display:none; border-color:var(--danger-color);" onclick="handleDeleteFromModal()">
                    <i class="fa-solid fa-trash"></i> Supprimer
                </button>
                <div style="display:flex; gap:10px; margin-left: auto;">
                    <button type="button" class="btn btn-secondary" onclick="closeNewTaskModal()">Annuler</button>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="assets/js/app.v2.js?v=2.2"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await initFirebase();
        initTheme();
        updateDateDisplay();
        renderAtelier();
    });
</script>
</body>
</html>
